{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="container">
  <h2>Create a New Todo</h2>
    <div>
      <label for="name">Name:</label>
      <input type="text" name="name" id="name">
    </div>
    <!-- [추가됨] 이미지 업로드 필드 -->
    <div>
      <label for="image">Image:</label>
      <input type="file" id="image">
    </div>
    <div>
      <label for="description">Description:</label>
      <textarea name="description" id="description">
      </textarea>
    </div>

    <div>
      <label for="complete">Complete:</label>
      <input type="checkbox" name="complete" id="complete">
    </div>

    <div>
      <label for="exp">Experience Points:</label>
      <input type="number" name="exp" id="exp" min="0">
    </div>

    <button type="submit" id="todoCreate">Create</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>

// ✅ 클릭 이벤트 밖으로 꺼냄
const api = axios.create({ baseURL: "/" });

api.interceptors.request.use(config => {
  const csrfToken = document.cookie
    .split("; ")
    .find(row => row.startsWith("csrftoken"))
    ?.split("=")[1];
  if (csrfToken) config.headers["X-CSRFToken"] = csrfToken;
  return config;
});

document.getElementById("todoCreate").addEventListener("click", async () => {
  try {
    const formData = new FormData();

    // 입력된 Todo 데이터를 FormData에 추가
    formData.append("name", document.getElementById("name").value);
    formData.append("description", document.getElementById("description").value);
    formData.append("complete", document.getElementById("complete").checked);
    formData.append("exp", document.getElementById("exp").value || 0);

    // 이미지 파일 input 요소 가져오기
    const fileInput = document.getElementById("image");

    // 파일이 선택되어 있으면 FormData에 이미지 추가
    if (fileInput.files.length > 0) {
      formData.append("image", fileInput.files[0]);
    }

    // Todo 생성 API 호출
    // JSON 대신 FormData 형태로 서버에 전송
    const res = await api.post("/todo/viewsets/view/", formData);

    console.log(res.data);
    window.location.href = "/todo/list/";  // ✅ 생성 후 목록으로 이동

  } catch (err) {
    console.error(err.response?.data || err.message);
    alert("생성 실패");
  }
});

</script>
{% endblock %}
