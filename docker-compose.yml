services:
  db:
    image: postgres:16
    container_name: mysite_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mysite_db
      POSTGRES_USER: mysite_user
      POSTGRES_PASSWORD: mysite_password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
